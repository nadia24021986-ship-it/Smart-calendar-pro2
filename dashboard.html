<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Smart Calendar Pro 2.0</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="topbar">
    <div class="topbar-brand">
      <img src="/logo.png" alt="hendrosapp.com" class="topbar-logo" />
      <div class="brand-title">Smart Calendar Pro 2.0</div>
    </div>
    <div class="user-info">
      <span id="userLabel"></span>
      <button class="logout" id="logoutBtn">Keluar</button>
    </div>
  </div>

  <div class="content">
    <div class="card">
      <div class="card-header">
        <span>📅 Kalender</span>
        <div class="cal-nav">
          <button id="prevMonth">‹</button>
          <span id="monthLabel"></span>
          <button id="nextMonth">›</button>
        </div>
      </div>
      <div id="calGrid" class="cal-grid"></div>
      <div style="text-align:center;margin-top:10px;">
        <button class="btn btn-ghost" id="showAllBtn">🔄 Tampilkan Semua Data</button>
      </div>
    </div>

    <div class="card summary-card">
      <div class="summary-title">📊 Ringkasan Bulan Ini</div>
      <div class="summary-row">
        <div class="summary-box">
          <div class="summary-label">TOTAL TAMU</div>
          <div class="summary-val" id="totalTamu">0</div>
        </div>
        <div class="summary-box accent">
          <div class="summary-label">TOTAL JUMLAH</div>
          <div class="summary-val accent" id="totalJumlah">0</div>
        </div>
      </div>
    </div>

    <div class="toolbar2">
      <input type="text" id="searchInput" placeholder="🔍 Cari tamu, mess, keterangan..." />
      <select id="filterPeace">
        <option value="">Semua Mess</option>
      </select>
      <div class="export-wrap">
        <button class="btn btn-gold" id="exportBtn">📥 Ekspor</button>
        <div class="export-menu" id="exportMenu">
          <div class="export-group-label">CSV</div>
          <button onclick="exportData('date','csv')">Tanggal Dipilih</button>
          <button onclick="exportData('week','csv')">Mingguan</button>
          <button onclick="exportData('month','csv')">Bulanan</button>
          <div class="export-group-label">JPG</div>
          <button onclick="exportData('date','jpg')">Tanggal Dipilih</button>
          <button onclick="exportData('week','jpg')">Mingguan</button>
          <button onclick="exportData('month','jpg')">Bulanan</button>
        </div>
      </div>
      <button class="btn btn-primary" onclick="openModal()">+ Tambah Manual</button>
    </div>

    <div class="card" style="overflow-x:auto;">
      <div class="table-title">
        Jadwal Makan Katering
        <span class="badge-date" id="badgeDate">📅 Semua</span>
      </div>
      <div id="tableWrap"></div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal">
      <h2 id="modalTitle">Tambah Data</h2>
      <form id="entryForm">
        <div class="form-grid">
          <div>
            <label>Tanggal Masuk</label>
            <input type="date" id="f_date" required/>
          </div>
          <div>
            <label>Tanggal Keluar (opsional)</label>
            <input type="date" id="f_date_end"/>
          </div>
          <div class="full-width">
            <label>Nama Tamu</label>
            <input type="text" id="f_namaTamu" required placeholder="Nama tamu / grup"/>
          </div>
          <div>
            <label>Requester</label>
            <input type="text" id="f_requestor" placeholder="Nama requester"/>
          </div>
          <div>
            <label>Mess / Lokasi</label>
            <input type="text" id="f_peace" placeholder="Mess atau lokasi"/>
          </div>
          <div>
            <label>Jumlah</label>
            <input type="number" id="f_jumlah" min="0" value="0"/>
          </div>
          <div class="full-width">
            <label>Keterangan</label>
            <input type="text" id="f_keterangan" placeholder="Catatan tambahan..."/>
          </div>
        </div>

        <div class="items-section" style="margin-top:14px;">
          <h3>⏰ Waktu Makan</h3>
          <div id="waktuList"></div>
          <button type="button" class="add-item-btn" id="addWaktuBtn">+ Tambah Waktu</button>
        </div>

        <div class="items-section" style="margin-top:14px;">
          <h3>🍱 Ekstra</h3>
          <div id="ekstraList"></div>
          <button type="button" class="add-item-btn" id="addEkstraBtn">+ Tambah Ekstra</button>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="cancelBtn">Batal</button>
          <button type="submit" class="btn btn-primary">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
