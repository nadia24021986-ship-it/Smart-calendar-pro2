<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Catering Smart Calendar - Dashboard</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="topbar">
    <h1>📋 Catering Smart Calendar</h1>
    <div class="user-info">
      <span id="userLabel"></span>
      <button class="logout" id="logoutBtn">Keluar</button>
    </div>
  </div>

  <div class="toolbar">
    <input type="date" id="datePicker" />
    <button class="btn btn-secondary" id="todayBtn">Hari Ini</button>
    <button class="btn btn-primary" id="addBtn">+ Tambah Data</button>
  </div>

  <div class="content">
    <div class="record-header">
      <div class="title">DAILY RECORD FOOD &amp; DRINK</div>
      <div class="date" id="dateLabel"></div>
    </div>
    <div id="tableWrap"></div>
  </div>

  <div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal">
      <h2 id="modalTitle">Tambah Data</h2>
      <form id="entryForm">
        <div class="form-grid">
          <div>
            <label>No</label>
            <input type="number" id="f_no" min="1" />
          </div>
          <div>
            <label>Tanggal</label>
            <input type="date" id="f_date" required />
          </div>
          <div class="full-width">
            <label>Nama Tamu</label>
            <input type="text" id="f_namaTamu" required />
          </div>
          <div>
            <label>Requestor</label>
            <input type="text" id="f_requestor" />
          </div>
          <div>
            <label>Pleace (Tempat)</label>
            <input type="text" id="f_peace" />
          </div>
        </div>

        <div class="items-section">
          <h3>Item Pesanan</h3>
          <div id="itemsList"></div>
          <button type="button" class="add-item-btn" id="addItemBtn">+ Tambah Item</button>
        </div>

        <div class="upload-row">
          <label style="font-size:12.5px;font-weight:600;color:var(--muted);">Lampirkan referensi (gambar/PDF):</label>
          <input type="file" id="fileInput" accept="image/*,.pdf" />
        </div>
        <div id="attachmentsList" style="margin-top:8px;"></div>
        <div class="note-box">
          Catatan: lampiran disimpan sebagai berkas referensi pada data ini. Ekstraksi data otomatis dari gambar/PDF belum aktif — isi field di atas secara manual untuk saat ini.
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancelBtn">Batal</button>
          <button type="submit" class="btn btn-primary" id="saveBtn">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
