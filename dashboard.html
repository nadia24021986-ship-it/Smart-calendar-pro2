<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Catering Smart Calendar</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="topbar">
    <h1>📋 Catering Smart Calendar</h1>
    <div class="user-info">
      <span id="userLabel"></span>
      <button class="logout" id="logoutBtn">Keluar</button>
    </div>
  </div>

  <div class="content">
    <div class="card">
      <div class="card-header">
        <span>📅 Kalender</span>
        <div class="cal-nav">
          <button id="prevMonth">‹</button>
          <span id="monthLabel"></span>
          <button id="nextMonth">›</button>
        </div>
      </div>
      <div id="calGrid" class="cal-grid"></div>
      <div style="text-align:center;margin-top:8px;">
        <button class="btn btn-secondary" id="showAllBtn">🔄 Tampilkan Semua Data</button>
      </div>
    </div>

    <div class="card summary-card">
      <div class="summary-title">💰 Ringkasan Bulan Ini</div>
      <div class="summary-row">
        <div class="summary-box">
          <div class="summary-label">TOTAL TAMU</div>
          <div class="summary-val" id="totalTamu">0</div>
        </div>
        <div class="summary-box green">
          <div class="summary-label">TOTAL MAKANAN</div>
          <div class="summary-val green" id="totalMakanan">0</div>
        </div>
      </div>
    </div>

    <div class="toolbar2">
      <input type="text" id="searchInput" placeholder="🔍 Cari tamu, mess, atau petugas..." />
      <select id="filterPeace">
        <option value="">Semua Mess</option>
      </select>
      <div class="export-wrap">
        <button class="btn btn-primary" id="exportBtn">📥 Ekspor</button>
        <div class="export-menu" id="exportMenu">
          <div class="export-group-label">CSV</div>
          <button onclick="exportData('today','csv')">Hari Ini</button>
          <button onclick="exportData('week','csv')">Seminggu Ini</button>
          <button onclick="exportData('month','csv')">Bulan Ini</button>
          <div class="export-group-label">JPG</div>
          <button onclick="exportData('today','jpg')">Hari Ini</button>
          <button onclick="exportData('week','jpg')">Seminggu Ini</button>
          <button onclick="exportData('month','jpg')">Bulan Ini</button>
        </div>
      </div>
      <button class="btn btn-primary" onclick="openModal()">+ Tambah Manual</button>
    </div>

    <div class="card" style="overflow-x:auto;">
      <div class="table-title">
        Jadwal Makan Katering
        <span class="badge-total" id="badgeTotal">Total: 0</span>
      </div>
      <div id="tableWrap"></div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal">
      <h2 id="modalTitle">Tambah Data</h2>
      <form id="entryForm">
        <div class="form-grid">
          <div>
            <label>Dari Tanggal</label>
            <input type="date" id="f_date" required/>
          </div>
          <div>
            <label>Sampai Tanggal (opsional)</label>
            <input type="date" id="f_date_end"/>
          </div>
          <div class="full-width">
            <label>Nama Tamu</label>
            <input type="text" id="f_namaTamu" required/>
          </div>
          <div>
            <label>Requestor</label>
            <input type="text" id="f_requestor"/>
          </div>
          <div>
            <label>Mess / Lokasi</label>
            <input type="text" id="f_peace"/>
          </div>
        </div>
        <div class="porsi-row">
          <div><label>Pagi (B)</label><input type="number" id="f_pagi" min="0" value="0"/></div>
          <div><label>Siang (L)</label><input type="number" id="f_siang" min="0" value="0"/></div>
          <div><label>Malam (D)</label><input type="number" id="f_malam" min="0" value="0"/></div>
        </div>
        <div class="items-section">
          <h3>Item Pesanan</h3>
          <div class="item-header-row">
            <span>Jam</span><span>Item</span><span>Qty</span><span>Remarks</span><span></span>
          </div>
          <div id="itemsList"></div>
          <button type="button" class="add-item-btn" id="addItemBtn">+ Tambah Item</button>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancelBtn">Batal</button>
          <button type="submit" class="btn btn-primary">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="/app.js"></script>
</body>
                                                                                            </html>
